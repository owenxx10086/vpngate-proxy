name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 强制使用 Node.js 24（额外保障）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2   # 已声明 node24

      - name: Log in to Container Registry
        uses: docker/login-action@v3.4.0   # 已声明 node24
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.5.0   # 已声明 node24
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 主分支推送时自动生成 latest 标签
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # 语义化版本标签 (v1.2.3)
            type=semver,pattern={{version}}
            # 短哈希标签 (用于历史回溯)
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.5.0   # 已声明 node24
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
