<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Gate 代理面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        .log-area { height: 300px; overflow-y: auto; background: #222; color: #0f0; font-family: monospace; padding: 10px; }
        .status-card { margin-bottom: 15px; }
        .modal-log-area { height: 200px; overflow-y: auto; background: #1e1e1e; color: #0f0; font-family: monospace; padding: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">VPN Gate 代理</span>
            <div>
                <a href="/logout" class="btn btn-outline-light btn-sm">登出</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <ul class="nav nav-tabs" id="mainTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">仪表盘</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#nodes">节点列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#settings">设置</button></li>
        </ul>
        <div class="tab-content mt-3">
            <!-- 仪表盘 -->
            <div class="tab-pane fade show active" id="dashboard">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card status-card">
                            <div class="card-header">连接状态</div>
                            <div class="card-body">
                                <p><strong>状态：</strong><span id="status-text">未连接</span></p>
                                <p><strong>节点：</strong><span id="node-name">-</span></p>
                                <p><strong>IP：</strong><span id="node-ip">-</span></p>
                                <p><strong>归属地：</strong><span id="node-location">-</span></p>
                                <p>
                                    <strong>SOCKS5：</strong>
                                    <code id="socks-link">-</code>
                                    <button id="copy-socks-btn" class="btn btn-sm btn-outline-secondary ms-2" title="复制地址" disabled>📋 复制</button>
                                </p>
                                <p>
                                    <button id="disconnect-btn" class="btn btn-danger btn-sm">断开连接</button>
                                    <button id="connect-btn" class="btn btn-success btn-sm">连接</button>
                                    <button id="reconnect-btn" class="btn btn-warning btn-sm">重新连接</button>
                                </p>
                            </div>
                        </div>
                        <div class="card status-card">
                            <div class="card-header">IP 检测结果</div>
                            <div class="card-body" id="ip-info">暂无</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">实时日志</div>
                            <div class="card-body p-0">
                                <div id="log-panel" class="log-area"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 节点列表 -->
            <div class="tab-pane fade" id="nodes">
                <div class="mb-3">
                    <select id="region-filter" class="form-select w-auto d-inline">
                        <option value="all">所有地区</option>
                    </select>
                    <button id="refresh-btn" class="btn btn-primary">刷新列表</button>
                    <span id="refresh-status" class="ms-2 text-muted"></span>
                </div>
                <div id="node-stats" class="mb-2 text-muted small"></div>
                <table class="table table-bordered table-striped">
                    <thead><tr><th>#</th><th>国家</th><th>IP</th><th>速率</th><th>会话数</th><th>操作</th></tr></thead>
                    <tbody id="node-table"></tbody>
                </table>
            </div>
            <!-- 设置 -->
            <div class="tab-pane fade" id="settings">
                <form id="settings-form">
                    <div class="mb-3"><label>面板密码</label><input type="password" class="form-control" id="cfg-password"></div>
                    <div class="mb-3"><label>API 地址</label><input class="form-control" id="cfg-api-url"></div>
                    <div class="mb-3"><label>SOCKS 端口</label><input type="number" class="form-control" id="cfg-socks-port"></div>
                    <div class="mb-3"><label>面板端口 (重启生效)</label><input type="number" class="form-control" id="cfg-web-port"></div>
                    <div class="mb-3"><label>VPN 用户名</label><input class="form-control" id="cfg-vpn-user"></div>
                    <div class="mb-3"><label>VPN 密码</label><input type="password" class="form-control" id="cfg-vpn-pass"></div>
                    <div class="mb-3">
                        <label>默认连接地区</label>
                        <select id="cfg-region" class="form-select">
                            <option value="all">所有地区</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>节点数据上限</label><input type="number" class="form-control" id="cfg-node-limit" min="1" max="1000"></div>
                    <div class="mb-3"><label>检测数量上限</label><input type="number" class="form-control" id="cfg-check-limit" min="1" max="500"></div>
                    <button type="submit" class="btn btn-success">保存</button>
                    <button type="button" id="restart-btn" class="btn btn-danger ms-2">保存并重启服务</button>
                    <span id="settings-msg" class="ms-3"></span>
                </form>
                <hr>
                <div class="card">
                    <div class="card-header">系统信息</div>
                    <div class="card-body" id="system-info">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 连接进度模态框 -->
    <div class="modal fade" id="connectModal" tabindex="-1" aria-labelledby="connectModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="connectModalLabel">连接节点</h5>
                    <button type="button" class="btn-close" id="modal-close-btn" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modal-status-text">正在连接...</p>
                    <div id="modal-log-panel" class="modal-log-area"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="modal-cancel-btn">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const logPanel = document.getElementById("log-panel");
        const modalLogPanel = document.getElementById("modal-log-panel");
        const connectModal = new bootstrap.Modal(document.getElementById("connectModal"));
        let isConnecting = false;
        let modalVisible = false;
        let allNodes = [];
        let isRefreshing = false;
        let configRegion = "all";

        socket.on("log", (data) => {
            const msg = `<div>${data.message}</div>`;
            logPanel.innerHTML += msg;
            logPanel.scrollTop = logPanel.scrollHeight;
            if (modalVisible) {
                modalLogPanel.innerHTML += msg;
                modalLogPanel.scrollTop = modalLogPanel.scrollHeight;
            }
        });

        async function updateStatus() {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();
                document.getElementById("status-text").textContent = data.connected ? "已连接" : "未连接";
                document.getElementById("node-name").textContent = data.node_info?.hostname || "-";
                document.getElementById("node-ip").textContent = data.node_info?.ip || "-";
                document.getElementById("node-location").textContent = data.node_info?.country_long || "-";
                const socksLink = data.socks || "-";
                document.getElementById("socks-link").textContent = socksLink;
                const copyBtn = document.getElementById("copy-socks-btn");
                copyBtn.disabled = !(data.connected && socksLink !== "-");
                const ipInfo = document.getElementById("ip-info");
                if (data.ip_info && Object.keys(data.ip_info).length > 0) {
                    ipInfo.innerHTML = Object.entries(data.ip_info).map(([k,v]) => `<p><strong>${k}:</strong> ${v}</p>`).join("");
                } else {
                    ipInfo.textContent = "暂无";
                }
            } catch(e) { console.error(e); }
        }
        setInterval(updateStatus, 3000);
        updateStatus();

        document.getElementById("copy-socks-btn").addEventListener("click", () => {
            const socks = document.getElementById("socks-link").textContent;
            if (!socks || socks === "-") return;
            const btn = document.getElementById("copy-socks-btn");
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(socks).then(() => {
                    btn.textContent = "✅ 已复制";
                    setTimeout(() => { btn.textContent = "📋 复制"; }, 2000);
                }).catch(() => fallbackCopy(socks, btn));
            } else {
                fallbackCopy(socks, btn);
            }
        });

        function fallbackCopy(text, btn) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = 0;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand("copy");
                btn.textContent = "✅ 已复制";
            } catch (err) {
                alert("复制失败，请手动复制：" + text);
            } finally {
                document.body.removeChild(textarea);
                setTimeout(() => { btn.textContent = "📋 复制"; }, 2000);
            }
        }

        function buildRegionOptions(nodes) {
            const regions = new Set();
            nodes.forEach(n => {
                if (n.country_short) regions.add(JSON.stringify({short: n.country_short, long: n.country_long}));
            });
            const sorted = Array.from(regions).map(JSON.parse).sort((a,b) => a.short.localeCompare(b.short));
            let html = '<option value="all">所有地区</option>';
            sorted.forEach(r => {
                html += `<option value="${r.short}">${r.long} (${r.short})</option>`;
            });
            return html;
        }

        function populateRegionFilter(nodes) {
            const select = document.getElementById("region-filter");
            const currentVal = select.value || localStorage.getItem("selectedRegion") || "all";
            select.innerHTML = buildRegionOptions(nodes);
            if ([...select.options].some(opt => opt.value === currentVal)) {
                select.value = currentVal;
            } else {
                select.value = "all";
            }
        }

        function updateSettingsRegionDropdown(nodes) {
            const select = document.getElementById("cfg-region");
            const currentVal = select.value || configRegion || "all";
            select.innerHTML = buildRegionOptions(nodes);
            if ([...select.options].some(opt => opt.value === currentVal)) {
                select.value = currentVal;
            } else {
                select.value = "all";
            }
        }

        function renderNodeTable(nodes) {
            const tbody = document.getElementById("node-table");
            let html = "";
            nodes.forEach((n, idx) => {
                html += `<tr>
                    <td>${idx+1}</td>
                    <td>${n.country_long} (${n.country_short})</td>
                    <td>${n.ip}</td>
                    <td>${n.speed} bps</td>
                    <td>${n.num_sessions}</td>
                    <td><button class="btn btn-sm btn-primary connect-btn" data-ip="${n.ip}" ${isConnecting ? 'disabled' : ''}>连接</button></td>
                </tr>`;
            });
            tbody.innerHTML = html || "<tr><td colspan='6'>无节点数据</td></tr>";
        }

        function updateStats(nodes) {
            const statsDiv = document.getElementById("node-stats");
            if (!nodes.length) {
                statsDiv.textContent = "";
                return;
            }
            const total = nodes.length;
            const countryCount = {};
            nodes.forEach(n => {
                const key = n.country_long + " (" + n.country_short + ")";
                countryCount[key] = (countryCount[key] || 0) + 1;
            });
            const countryStr = Object.entries(countryCount).map(([k,v]) => `${k}: ${v}`).join(", ");
            statsDiv.textContent = `总节点数: ${total} | ${countryStr}`;
        }

        function setConnecting(state) {
            isConnecting = state;
            document.querySelectorAll(".connect-btn").forEach(btn => {
                btn.disabled = state;
            });
        }

        async function refreshNodes() {
            if (isRefreshing) return;
            const btn = document.getElementById("refresh-btn");
            const status = document.getElementById("refresh-status");
            btn.disabled = true;
            isRefreshing = true;
            status.textContent = "刷新中...";
            const region = document.getElementById("region-filter").value;
            localStorage.setItem("selectedRegion", region);
            try {
                const res = await fetch(`/api/nodes?region=${encodeURIComponent(region)}`);
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || `HTTP ${res.status}`);
                }
                const nodes = await res.json();
                allNodes = nodes;
                renderNodeTable(nodes);
                updateStats(nodes);
                populateRegionFilter(nodes);
                updateSettingsRegionDropdown(nodes);
                status.textContent = "刷新完成";
                setTimeout(() => { status.textContent = ""; }, 2000);
            } catch(e) {
                alert("获取节点列表失败: " + e.message);
                status.textContent = "刷新失败";
                setTimeout(() => { status.textContent = ""; }, 2000);
            } finally {
                btn.disabled = false;
                isRefreshing = false;
            }
        }

        // 地区筛选器变化时自动刷新
        document.getElementById("region-filter").addEventListener("change", () => {
            refreshNodes();
        });

        async function connectNode(ip, depth = 0) {
            if (isConnecting && depth === 0) return;
            const MAX_RETRIES = 3;
            setConnecting(true);

            if (depth === 0) {
                modalVisible = true;
                document.getElementById("modal-status-text").textContent = `正在连接 ${ip} ...`;
                document.getElementById("modal-log-panel").innerHTML = "";
                document.getElementById("modal-close-btn").style.display = "none";
                document.getElementById("modal-cancel-btn").style.display = "none";
                connectModal.show();
            } else {
                const tip = `>>> 连接失败，自动尝试下一个节点 (${ip}) ...`;
                logPanel.innerHTML += `<div style="color: #ff0;">${tip}</div>`;
                logPanel.scrollTop = logPanel.scrollHeight;
                if (modalVisible) {
                    modalLogPanel.innerHTML += `<div style="color: #ff0;">${tip}</div>`;
                    modalLogPanel.scrollTop = modalLogPanel.scrollHeight;
                }
                document.getElementById("modal-status-text").textContent = `正在连接 ${ip} (第${depth+1}次尝试)...`;
                modalLogPanel.innerHTML = `<div style="color: #ff0;">${tip}</div>`;
                modalLogPanel.scrollTop = modalLogPanel.scrollHeight;
            }

            try {
                const res = await fetch("/api/connect", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ip })
                });
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || `HTTP ${res.status}`);
                }
                const data = await res.json();
                if (data.success) {
                    document.getElementById("modal-status-text").textContent = `✅ 已成功连接到 ${ip}`;
                    setTimeout(closeModal, 2000);
                    updateStatus();
                } else {
                    throw new Error(data.error || "连接失败");
                }
            } catch(e) {
                document.getElementById("modal-status-text").textContent = `❌ 连接 ${ip} 失败: ${e.message}`;
                if (depth < MAX_RETRIES - 1) {
                    const candidates = allNodes.filter(n => n.ip !== ip && !sessionStorage.getItem("failed_"+n.ip));
                    const nextNode = candidates.length > 0 ? candidates[0] : null;
                    if (nextNode) {
                        sessionStorage.setItem("failed_"+ip, "1");
                        document.getElementById("modal-status-text").textContent += "，正在自动尝试下一个节点...";
                        setTimeout(() => connectNode(nextNode.ip, depth+1), 1500);
                        return;
                    }
                }
                document.getElementById("modal-status-text").textContent += " 请手动刷新列表后重试。";
                document.getElementById("modal-cancel-btn").style.display = "inline-block";
                document.getElementById("modal-close-btn").style.display = "inline-block";
            } finally {
                if (depth === MAX_RETRIES - 1 || !allNodes.some(n => n.ip !== ip && !sessionStorage.getItem("failed_"+n.ip))) {
                    setConnecting(false);
                    modalVisible = false;
                    document.getElementById("modal-cancel-btn").style.display = "inline-block";
                    document.getElementById("modal-close-btn").style.display = "inline-block";
                }
            }
        }

        function closeModal() {
            connectModal.hide();
            modalVisible = false;
            setConnecting(false);
            sessionStorage.clear();
        }

        document.getElementById("node-table").addEventListener("click", (e) => {
            if (e.target.classList.contains("connect-btn")) {
                const ip = e.target.getAttribute("data-ip");
                if (ip) connectNode(ip);
            }
        });

        document.getElementById("refresh-btn").addEventListener("click", refreshNodes);
        document.getElementById("modal-cancel-btn").addEventListener("click", closeModal);
        document.getElementById("modal-close-btn").addEventListener("click", closeModal);

        // 仪表盘按钮
        document.getElementById("disconnect-btn").addEventListener("click", async () => {
            if (!confirm("确定要断开当前 VPN 连接吗？")) return;
            try {
                const res = await fetch("/api/disconnect", { method: "POST" });
                const data = await res.json();
                if (data.success) {
                    updateStatus();
                    alert("已断开连接");
                } else {
                    alert("断开失败");
                }
            } catch(e) { alert("请求失败"); }
        });

        document.getElementById("connect-btn").addEventListener("click", async () => {
            try {
                const res = await fetch("/api/auto_connect", { method: "POST" });
                const data = await res.json();
                if (data.success) {
                    updateStatus();
                    alert(`连接请求已发送 (${data.node})`);
                } else {
                    alert("连接失败: " + (data.error || "未知错误"));
                }
            } catch(e) { alert("请求失败"); }
        });

        document.getElementById("reconnect-btn").addEventListener("click", async () => {
            if (!confirm("确定要重新连接吗？")) return;
            try {
                await fetch("/api/disconnect", { method: "POST" });
                setTimeout(async () => {
                    const res = await fetch("/api/auto_connect", { method: "POST" });
                    const data = await res.json();
                    if (data.success) {
                        updateStatus();
                        alert(`已重新连接到 ${data.node}`);
                    } else {
                        alert("重新连接失败: " + (data.error || "未知错误"));
                    }
                }, 1500);
            } catch(e) { alert("断开失败"); }
        });

        // 设置页 - 保存并重启服务
        document.getElementById("restart-btn").addEventListener("click", async () => {
            if (!confirm("将保存当前设置并重启服务，确定继续？")) return;
            // 先收集表单数据并保存
            const newCfg = {
                web_password: document.getElementById("cfg-password").value,
                api_url: document.getElementById("cfg-api-url").value,
                socks_port: parseInt(document.getElementById("cfg-socks-port").value),
                web_port: parseInt(document.getElementById("cfg-web-port").value),
                vpn_user: document.getElementById("cfg-vpn-user").value,
                vpn_pass: document.getElementById("cfg-vpn-pass").value,
                region: document.getElementById("cfg-region").value,
                node_limit: parseInt(document.getElementById("cfg-node-limit").value),
                check_limit: parseInt(document.getElementById("cfg-check-limit").value)
            };
            const msg = document.getElementById("settings-msg");
            try {
                // 保存设置
                const saveRes = await fetch("/api/config", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newCfg)
                });
                const saveData = await saveRes.json();
                if (!saveData.success) {
                    msg.textContent = "保存失败，无法重启: " + (saveData.error || "未知错误");
                    msg.className = "ms-3 text-danger";
                    setTimeout(() => { msg.textContent = ""; msg.className = "ms-3"; }, 2000);
                    return;
                }
                // 重启
                const restartRes = await fetch("/api/restart", { method: "POST" });
                const restartData = await restartRes.json();
                if (restartData.success) {
                    alert("设置已保存，重启指令已发送，页面即将刷新");
                    setTimeout(() => location.reload(), 3000);
                } else {
                    alert("保存成功但重启失败: " + (restartData.error || "未知错误"));
                }
            } catch(e) {
                msg.textContent = "请求失败: " + e.message;
                msg.className = "ms-3 text-danger";
                setTimeout(() => { msg.textContent = ""; msg.className = "ms-3"; }, 2000);
            }
        });

        // 普通保存按钮保持不变
        async function loadSettings() {
            try {
                const res = await fetch("/api/config");
                const cfg = await res.json();
                document.getElementById("cfg-password").value = cfg.web_password || "";
                document.getElementById("cfg-api-url").value = cfg.api_url || "";
                document.getElementById("cfg-socks-port").value = cfg.socks_port || 1080;
                document.getElementById("cfg-web-port").value = cfg.web_port || 8080;
                document.getElementById("cfg-vpn-user").value = cfg.vpn_user || "";
                document.getElementById("cfg-vpn-pass").value = cfg.vpn_pass || "";
                document.getElementById("cfg-node-limit").value = cfg.node_limit || 200;
                document.getElementById("cfg-check-limit").value = cfg.check_limit || 20;
                configRegion = cfg.region || "all";
                if (allNodes.length > 0) {
                    updateSettingsRegionDropdown(allNodes);
                }
            } catch(e) {
                console.error("加载设置失败", e);
            }
        }

        document.getElementById("settings-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const newCfg = {
                web_password: document.getElementById("cfg-password").value,
                api_url: document.getElementById("cfg-api-url").value,
                socks_port: parseInt(document.getElementById("cfg-socks-port").value),
                web_port: parseInt(document.getElementById("cfg-web-port").value),
                vpn_user: document.getElementById("cfg-vpn-user").value,
                vpn_pass: document.getElementById("cfg-vpn-pass").value,
                region: document.getElementById("cfg-region").value,
                node_limit: parseInt(document.getElementById("cfg-node-limit").value),
                check_limit: parseInt(document.getElementById("cfg-check-limit").value)
            };
            const msg = document.getElementById("settings-msg");
            try {
                const res = await fetch("/api/config", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newCfg)
                });
                const data = await res.json();
                if (data.success) {
                    msg.textContent = data.restart_needed ? "保存成功，部分设置需重启容器生效" : "保存成功";
                    msg.className = "ms-3 text-success";
                } else {
                    msg.textContent = "保存失败: " + (data.error || "未知错误");
                    msg.className = "ms-3 text-danger";
                }
            } catch (err) {
                msg.textContent = "请求失败: " + err.message;
                msg.className = "ms-3 text-danger";
            }
            setTimeout(() => { msg.textContent = ""; msg.className = "ms-3"; }, 2000);
        });

        async function loadSystemInfo() {
            try {
                const res = await fetch("/api/system");
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                const div = document.getElementById("system-info");
                div.innerHTML = Object.entries(data).map(([key, val]) => `<p><strong>${key}:</strong> ${val}</p>`).join("");
            } catch(e) {
                document.getElementById("system-info").textContent = "加载系统信息失败: " + e.message;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadSettings();
